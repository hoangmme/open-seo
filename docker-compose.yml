services:
  open-seo:
    build:
      context: .
      dockerfile: Dockerfile.selfhost
    restart: unless-stopped
    environment:
      # Required for local Docker self-hosting: exposes Compose env vars to cloudflare:workers bindings.
      - CLOUDFLARE_INCLUDE_PROCESS_ENV=true
      - PORT=${PORT:-3001}
      - ALLOWED_HOST=${ALLOWED_HOST:-seo.mme.vn}
      - AUTH_MODE=local_noauth
      - DATAFORSEO_API_KEY=${DATAFORSEO_API_KEY}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
      - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET:-}
      - BETTER_AUTH_URL=${BETTER_AUTH_URL:-https://seo.mme.vn}
      - VITE_SHOW_DEVTOOLS=false
    labels:
      - "traefik.enable=true"
      - "traefik.http.services.openseo.loadbalancer.server.port=3001"
      - "traefik.docker.network=dokploy-network"
      # Basic Auth middleware
      - "traefik.http.middlewares.openseo-auth.basicauth.users=admin@mme.com.vn:$$apr1$$Ye6CJ3X8$$abXUBg4sl2xlJz87zMVu6/"
      # Router 1: MCP endpoint - NO Basic Auth (MCP has its own auth)
      - "traefik.http.routers.openseo-mcp.rule=Host(`seo.mme.vn`) && Path(`/mcp`)"
      - "traefik.http.routers.openseo-mcp.entrypoints=websecure"
      - "traefik.http.routers.openseo-mcp.tls.certresolver=letsencrypt"
      - "traefik.http.routers.openseo-mcp.priority=100"
      # Router 2: Everything else - WITH Basic Auth
      - "traefik.http.routers.openseo.rule=Host(`seo.mme.vn`)"
      - "traefik.http.routers.openseo.entrypoints=websecure"
      - "traefik.http.routers.openseo.tls.certresolver=letsencrypt"
      - "traefik.http.routers.openseo.middlewares=openseo-auth"
      - "traefik.http.routers.openseo.priority=1"
    networks:
      - dokploy-network
    volumes:
      - open_seo_data:/app/.wrangler

volumes:
  open_seo_data:

networks:
  dokploy-network:
    external: true
